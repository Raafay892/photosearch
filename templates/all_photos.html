<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Photos</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 220px);
      }

      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        padding: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 36px);
        letter-spacing: -0.02em;
      }

      .results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 14px;
        margin-top: 14px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        background: #fff;
        cursor: pointer;
      }

      .btn-primary {
        border: 0;
        background: #2563eb;
        color: #fff;
      }

      .tile {
        position: relative;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #fff;
        transition: transform 0.2s ease;
      }

      .tile:hover {
        transform: translateY(-3px);
      }

      .results img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      .select-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 24px;
        height: 24px;
        border-radius: 7px;
        border: 1px solid #cbd5e1;
        background: rgba(255, 255, 255, 0.96);
        display: grid;
        place-items: center;
      }

      .select-overlay input {
        width: 16px;
        height: 16px;
        margin: 0;
      }

      .hint {
        color: var(--muted);
        font-size: 14px;
        margin: 6px 0 0;
      }

      .nav-link {
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        color: #0f172a;
        background: #fff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h1>All Photos</h1>
          <p class="hint">Total photos: {{ photos_count }}</p>
        </div>
        <a class="nav-link" href="/">Back to search</a>
      </div>

      <div class="card">
        {% if all_photos and all_photos|length > 0 %}
        <form id="download-form">
          <div class="actions">
            <button type="button" class="btn" id="select-all">Select all</button>
            <button type="button" class="btn" id="clear-all">Clear</button>
            <button type="button" class="btn btn-primary" id="download-selected">Download selected</button>
            <span class="hint" id="selected-count">0 selected</span>
          </div>

          <div class="results">
            {% for rel in all_photos %}
            <div class="tile">
              <label class="select-overlay" title="Select photo">
                <input type="checkbox" name="selected_photos" value="{{ rel }}" class="photo-check" data-path="{{ rel }}" />
              </label>
              <a href="/photos/{{ rel }}" target="_blank" rel="noopener noreferrer">
                <img src="/photos/{{ rel }}" alt="photo {{ loop.index }}" loading="lazy" />
              </a>
            </div>
            {% endfor %}
          </div>
        </form>
        {% else %}
        <p class="hint">No photos found in folder.</p>
        {% endif %}
      </div>
    </div>

    <script>
      const checks = Array.from(document.querySelectorAll(".photo-check"));
      const selectedCount = document.getElementById("selected-count");
      const selectAllBtn = document.getElementById("select-all");
      const clearAllBtn = document.getElementById("clear-all");
      const form = document.getElementById("download-form");
      const downloadSelectedBtn = document.getElementById("download-selected");

      function updateSelectedCount() {
        if (!selectedCount) return;
        const count = checks.filter((item) => item.checked).length;
        selectedCount.textContent = `${count} selected`;
      }

      checks.forEach((item) => item.addEventListener("change", updateSelectedCount));

      if (selectAllBtn) {
        selectAllBtn.addEventListener("click", () => {
          checks.forEach((item) => {
            item.checked = true;
          });
          updateSelectedCount();
        });
      }

      if (clearAllBtn) {
        clearAllBtn.addEventListener("click", () => {
          checks.forEach((item) => {
            item.checked = false;
          });
          updateSelectedCount();
        });
      }

      if (downloadSelectedBtn) {
        downloadSelectedBtn.addEventListener("click", () => {
          const selectedPaths = checks
            .filter((item) => item.checked)
            .map((item) => item.dataset.path)
            .filter(Boolean);

          if (selectedPaths.length === 0) {
            alert("Please select at least one photo to download.");
            return;
          }

          selectedPaths.forEach((path, index) => {
            setTimeout(() => {
              const encodedPath = path
                .split("/")
                .map((segment) => encodeURIComponent(segment))
                .join("/");
              const link = document.createElement("a");
              link.href = `/photos/${encodedPath}?download=1`;
              link.download = "";
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
            }, index * 180);
          });
        });
      }

      updateSelectedCount();
    </script>
  </body>
</html>
