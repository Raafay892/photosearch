<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Photos</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 220px);
      }

      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        padding: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 36px);
        letter-spacing: -0.02em;
      }

      .results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 14px;
        margin-top: 14px;
      }

      .tile {
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #fff;
        transition: transform 0.2s ease;
      }

      .tile:hover {
        transform: translateY(-3px);
      }

      .results img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      .hint {
        color: var(--muted);
        font-size: 14px;
        margin: 6px 0 0;
      }

      .nav-link {
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        color: #0f172a;
        background: #fff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h1>All Photos</h1>
          <p class="hint">Total photos: {{ photos_count }}</p>
        </div>
        <a class="nav-link" href="/">Back to search</a>
      </div>

      <div class="card">
        {% if all_photos and all_photos|length > 0 %}
        <div class="results">
          {% for rel in all_photos %}
          <a class="tile" href="/photos/{{ rel }}" target="_blank" rel="noopener noreferrer">
            <img src="/photos/{{ rel }}" alt="photo {{ loop.index }}" loading="lazy" />
          </a>
          {% endfor %}
        </div>
        {% else %}
        <p class="hint">No photos found in folder.</p>
        {% endif %}
      </div>
    </div>
  </body>
</html>
