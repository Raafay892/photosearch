[variables]
NIXPACKS_PYTHON_PACKAGE_MANAGER = "pip"

[phases.setup]
aptPkgs = ["cmake", "build-essential", "python3-dev", "libopenblas-dev", "liblapack-dev"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "python -m pip install -r requirements.txt"]

[start]
cmd = "python -m gunicorn -c gunicorn.conf.py app:app"
